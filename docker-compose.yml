version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: orchestrix-db
    environment:
      POSTGRES_USER: orchestrix
      POSTGRES_PASSWORD: orchestrix_pass
      POSTGRES_DB: orchestrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrix -d orchestrix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
