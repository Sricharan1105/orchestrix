# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; defaults to "os.pathsep".
# Use a dot to use the same path separator on all platforms
# version_path_separator = :

# set to 'true' to search for newer versions of migrations
# in all version_locations
# search_type = recursive

# We default to PostgreSQL connection parameter, but env.py will override dynamically
sqlalchemy.url = postgresql://orchestrix:orchestrix_pass@localhost:5432/orchestrix

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
